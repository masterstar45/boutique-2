[variables]
COREPACK_INTEGRITY_KEYS = "0"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install --frozen-lockfile=false"
]

[phases.build]
cmds = [
  "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/boutique run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
