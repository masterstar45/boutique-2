packages:
  "framer-motion": "For page transitions, list animations, and interactive elements"
  "date-fns": "For formatting order dates and review dates"
  "clsx": "For conditional tailwind classes"
  "tailwind-merge": "For merging tailwind classes safely"

images:
  - path: "artifacts/boutique/public/images/logo.png"
    description: "Premium luxury minimalist logo for a boutique called PharmacyHash. Dark background, emerald green geometric leaf icon, elegant typography, high-end feel."
    aspect_ratio: "1:1"
  - path: "artifacts/boutique/public/images/bg-glow.png"
    description: "Abstract dark background with subtle glowing emerald green and dark teal orbs, soft light leaks, glassmorphism style, completely dark and premium."
    aspect_ratio: "16:9"

notes:
  - The API relies on generated hooks from @workspace/api-client-react
  - Cart relies on localStorage 'cart_session_id'
  - User identity relies on localStorage 'telegram_chat_id'
  - Admin access is gated by localStorage 'admin_auth' === 'admin123'
