<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🔌 SOS LE PLUG 🔌</title>
    <link rel="icon" type="image/png" href="/bg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function() {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
          tg.expand();
          try { if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen(); } catch(e) {}
          tg.setHeaderColor('#080603');
          tg.setBackgroundColor('#080603');
          tg.setBottomBarColor('#080603');

          /* ── Safe areas CSS variables (dès le chargement) ── */
          function applyAreas() {
            /* En mode NON-fullscreen : Telegram gère le layout lui-même → 0 */
            /* En FULLSCREEN uniquement : additionner barre statut + barre Telegram */
            var isFs = !!tg.isFullscreen; /* PAS isExpanded : true en mode normal aussi */
            if (!isFs) {
              document.documentElement.style.setProperty('--tg-safe-top',    '0px');
              document.documentElement.style.setProperty('--tg-safe-bottom', '0px');
              return;
            }
            var devT = (tg.safeAreaInset && tg.safeAreaInset.top)    || 0;
            var devB = (tg.safeAreaInset && tg.safeAreaInset.bottom) || 0;
            var tgT  = (tg.contentSafeAreaInset && tg.contentSafeAreaInset.top)    || 0;
            var tgB  = (tg.contentSafeAreaInset && tg.contentSafeAreaInset.bottom) || 0;
            var sumT = devT + tgT;
            var sumB = devB + tgB;
            document.documentElement.style.setProperty('--tg-safe-top',    (sumT || 80) + 'px');
            document.documentElement.style.setProperty('--tg-safe-bottom', (sumB || 20) + 'px');
          }
          applyAreas();
          try { tg.onEvent('safeAreaChanged',        applyAreas); } catch(e) {}
          try { tg.onEvent('contentSafeAreaChanged', applyAreas); } catch(e) {}
          try { tg.onEvent('viewportChanged',        applyAreas); } catch(e) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
