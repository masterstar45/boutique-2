<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🔌 SOS LE PLUG 🔌</title>
    <link rel="icon" type="image/png" href="/bg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function() {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
          tg.expand();
          if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen();
          tg.setHeaderColor('#080603');
          tg.setBackgroundColor('#080603');
          tg.setBottomBarColor('#080603');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
