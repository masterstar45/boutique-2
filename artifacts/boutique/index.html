<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🔌 SOS LE PLUG 🔌</title>
    <link rel="icon" type="image/png" href="/bg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function() {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
          tg.expand();
          try { if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen(); } catch(e) {}
          tg.setHeaderColor('#080603');
          tg.setBackgroundColor('#080603');
          tg.setBottomBarColor('#080603');

          /* ── Safe areas CSS variables (dès le chargement) ── */
          var rawT = (tg.safeAreaInset && tg.safeAreaInset.top)    || (tg.contentSafeAreaInset && tg.contentSafeAreaInset.top)    || 0;
          var rawB = (tg.safeAreaInset && tg.safeAreaInset.bottom) || (tg.contentSafeAreaInset && tg.contentSafeAreaInset.bottom) || 0;
          var isFs = !!(tg.isFullscreen || tg.isExpanded);
          var t = rawT || (isFs ? 44 : 0);
          var b = rawB || (isFs ? 20 : 0);
          document.documentElement.style.setProperty('--tg-safe-top',    t + 'px');
          document.documentElement.style.setProperty('--tg-safe-bottom', b + 'px');

          /* Mise à jour après que le fullscreen soit activé */
          try {
            tg.onEvent('safeAreaChanged', function() {
              var nt = (tg.safeAreaInset && tg.safeAreaInset.top)    || 0;
              var nb = (tg.safeAreaInset && tg.safeAreaInset.bottom) || 0;
              if (nt) document.documentElement.style.setProperty('--tg-safe-top',    nt + 'px');
              if (nb) document.documentElement.style.setProperty('--tg-safe-bottom', nb + 'px');
            });
          } catch(e) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
